services:
  - type: web
    name: clinic-reminder-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: APP_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_PLAN_ID
        sync: false

  - type: worker
    name: clinic-scheduler
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from app.scheduler.reminder_scheduler import start_scheduler; import time; start_scheduler(); [time.sleep(60) for _ in iter(int, 1)]"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: JWT_SECRET
        sync: false
